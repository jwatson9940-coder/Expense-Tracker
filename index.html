<style>

  *{box-sizing:border-box;}
  body{margin:0;}
  #jf-root{font-family:'Inter',system-ui,sans-serif;color:var(--text);background:var(--bg);min-height:100%;}

  .jf-status-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:9px;}
  .jf-status-name{font-weight:600;font-size:13.5px;}
  .jf-status-state{font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;font-weight:700;padding:2px 8px;border-radius:20px;}
  .jf-status-state.under{background:rgba(111,207,151,.15);color:var(--accent);}
  .jf-status-state.over{background:rgba(226,114,90,.15);color:var(--warn);}
  .jf-status-amt{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;margin-bottom:8px;}
  .jf-status-amt span{font-size:12px;color:var(--text-faint);font-weight:400;}
  .jf-status-track{height:8px;border-radius:6px;background:var(--border);overflow:hidden;}
  .jf-status-fill{height:100%;border-radius:6px;}
  .jf-status-sub{font-size:11px;color:var(--text-faint);margin-top:6px;}

  .jf-tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:20px;}
  .jf-tab{background:none;border:none;color:var(--text-soft);font-family:'Inter',sans-serif;font-size:13.5px;font-weight:600;padding:10px 14px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;}
  .jf-tab.active{color:var(--text);border-bottom-color:var(--accent);}
  .jf-tab:hover{color:var(--text);}

  .jf-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  @media(max-width:680px){.jf-grid{grid-template-columns:1fr;}}
  .jf-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px;}
  .jf-card h2{font-family:'Fraunces',serif;font-size:15.5px;margin:0 0 14px;font-weight:600;display:flex;justify-content:space-between;align-items:baseline;}

  .jf-vs-bar-fill{height:100%;border-radius:4px;}
  .jf-badge{font-size:9.5px;text-transform:uppercase;letter-spacing:.06em;font-weight:700;background:var(--accent);color:#0B0D10;padding:2px 7px;border-radius:20px;}

  .jf-budget-row{margin-bottom:13px;}
  .jf-budget-row:last-child{margin-bottom:0;}
  .jf-budget-top{display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:5px;}
  .jf-budget-top .cat{font-weight:600;display:flex;align-items:center;gap:6px;color:var(--text-soft);}
  .jf-dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0;}
  .jf-budget-track{height:7px;background:var(--border);border-radius:5px;overflow:hidden;}
  .jf-budget-fill{height:100%;border-radius:5px;}
  .jf-budget-over{font-size:11px;color:var(--warn);font-weight:600;margin-top:3px;}

  .jf-donut-wrap{display:flex;align-items:center;gap:18px;flex-wrap:wrap;}
  .jf-donut{width:140px;height:140px;border-radius:50%;flex-shrink:0;position:relative;}
  .jf-donut-hole{position:absolute;inset:18px;border-radius:50%;background:var(--surface);display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .jf-donut-hole b{font-family:'JetBrains Mono',monospace;font-size:15px;}
  .jf-donut-hole span{font-size:9.5px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.06em;}
  .jf-legend{flex:1;min-width:140px;display:flex;flex-direction:column;gap:7px;}
  .jf-legend-row{display:flex;justify-content:space-between;font-size:12px;color:var(--text-soft);gap:8px;}
  .jf-legend-row .lab{display:flex;align-items:center;gap:6px;}
  .jf-legend-row b{color:var(--text);font-family:'JetBrains Mono',monospace;font-weight:500;}

  .jf-cmp-row{margin-bottom:11px;}
  .jf-cmp-row:last-child{margin-bottom:0;}
  .jf-cmp-cat{font-size:11.5px;color:var(--text-soft);margin-bottom:4px;display:flex;align-items:center;gap:6px;}
  .jf-cmp-bars{display:flex;flex-direction:column;gap:3px;}
  .jf-cmp-bar-track{height:7px;background:var(--border);border-radius:4px;overflow:hidden;}
  .jf-cmp-bar-fill{height:100%;border-radius:4px;}
  .jf-cmp-vals{display:flex;justify-content:space-between;font-size:10px;color:var(--text-faint);font-family:'JetBrains Mono',monospace;}

  .jf-empty{font-size:13px;color:var(--text-faint);text-align:center;padding:24px 10px;}
  .jf-nudge{background:var(--surface-2);border:1px dashed var(--border);border-radius:12px;padding:14px 16px;font-size:13.5px;line-height:1.55;color:var(--text-soft);}
  .jf-nudge b{color:var(--text);}
  .jf-streak-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
  .jf-streak-pill{background:var(--surface-2);border:1px solid var(--border);border-radius:20px;padding:6px 12px;font-size:11.5px;font-weight:600;color:var(--text-soft);}
  .jf-streak-pill b{color:var(--text);}

  .jf-form{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .jf-form .full{grid-column:1/-1;}
  .jf-field label{display:block;font-size:10.5px;font-weight:600;color:var(--text-faint);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;}
  .jf-field input,.jf-field select{width:100%;padding:9px 10px;border:1px solid var(--border);border-radius:9px;font-family:'Inter',sans-serif;font-size:13.5px;background:var(--surface-2);color:var(--text);}
  .jf-field input:focus,.jf-field select:focus{outline:none;border-color:var(--accent);}
  .jf-toggle{display:flex;border:1px solid var(--border);border-radius:9px;overflow:hidden;}
  .jf-toggle button{flex:1;border:none;background:var(--surface-2);padding:9px 6px;font-size:13px;cursor:pointer;font-family:'Inter',sans-serif;font-weight:600;color:var(--text-soft);}
  .jf-toggle button.active{background:var(--accent);color:#0B0D10;}
  .jf-btn{border:none;border-radius:10px;padding:10px 16px;font-weight:700;font-size:13.5px;cursor:pointer;font-family:'Inter',sans-serif;}
  .jf-btn-primary{background:var(--accent);color:#0B0D10;}
  .jf-btn-primary:hover{opacity:.9;}

  .jf-tx{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border-soft);font-size:13px;}
  .jf-tx:last-child{border-bottom:none;}
  .jf-tx-left{display:flex;align-items:center;gap:9px;}
  .jf-tx-meta{color:var(--text-faint);font-size:11px;}
  .jf-tx-amt{font-family:'JetBrains Mono',monospace;font-weight:700;}
  .jf-tx-amt.pos{color:var(--accent);}
  .jf-tx-del{background:none;border:none;color:var(--text-faint);cursor:pointer;font-size:15px;padding:2px 6px;}
  .jf-tx-del:hover{color:var(--warn);}

  .jf-monthnav{display:flex;align-items:center;gap:8px;margin-bottom:16px;}
  .jf-monthnav button{background:var(--surface-2);border:1px solid var(--border);color:var(--text);border-radius:8px;width:30px;height:30px;cursor:pointer;font-size:14px;}
  .jf-monthnav select{font-family:'Inter',sans-serif;font-weight:600;font-size:13px;border:1px solid var(--border);border-radius:9px;padding:7px 10px;background:var(--surface-2);color:var(--text);}

  .jf-cat-budget-grid{display:grid;grid-template-columns:1fr 90px;gap:9px;align-items:center;}
  .jf-cat-budget-grid label{font-size:12.5px;color:var(--text-soft);display:flex;align-items:center;gap:6px;}
  .jf-budget-total-row{display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--border);margin-top:10px;padding-top:10px;font-weight:700;font-size:13px;}
  .jf-budget-total-row span{font-family:'JetBrains Mono',monospace;color:var(--accent);}

  .jf-settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  @media(max-width:680px){.jf-settings-grid{grid-template-columns:1fr;}}
  .jf-info-box{background:var(--surface-2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;font-size:13px;color:var(--text-soft);line-height:1.6;}
  .jf-info-box b{color:var(--text);}

  .jf-footer-note{text-align:center;font-size:11px;color:var(--text-faint);margin-top:30px;line-height:1.6;}
  .jf-loading{text-align:center;padding:60px 20px;color:var(--text-soft);font-size:14px;}
</style>

<div id="jf-root"><div class="jf-loading">Loading…</div></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import {
  getFirestore,
  doc,
  getDoc,
  setDoc,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBoMk2lTKnc6Xbpal37GaMVqMxG8dIvv5o",
  authDomain: "expense-tracker-65e10.firebaseapp.com",
  projectId: "expense-tracker-65e10",
  storageBucket: "expense-tracker-65e10.firebasestorage.app",
  messagingSenderId: "481425463915",
  appId: "1:481425463915:web:d9584631a6e58f0d0e6f2e",
  measurementId: "G-FHYXDLR1C9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

(function(){
  const CATS = [
    {id:'food',       name:'Food & Snacks',   color:'#E2725A'},
    {id:'groceries',  name:'Groceries',        color:'#6FCF97'},
    {id:'eatingout',  name:'Eating Out',       color:'#E8A75D'},
    {id:'transport',  name:'Transport',        color:'#5B9BD5'},
    {id:'entertainment', name:'Entertainment', color:'#B58CE0'},
    {id:'subscriptions', name:'Subscriptions', color:'#6FA8A0'},
    {id:'shopping',   name:'Shopping',         color:'#C9A26B'},
    {id:'other',      name:'Other',            color:'#7C8593'},
  ];
  const catById = id => CATS.find(c=>c.id===id)||CATS[CATS.length-1];

  const DEFAULT_CAT_BUDGETS = {food:80,groceries:60,eatingout:50,transport:30,entertainment:30,subscriptions:20,shopping:0,other:10};

  let state = {
    settings: {names:['You','Partner'], tripDate:'2026-11-15', milestoneLabel:'Busselton'},
    catBudgets: {...DEFAULT_CAT_BUDGETS},
    expenses: [],
    fund: [],
    person: 0,
    fundPerson: 0,
    tab: 'overview',
    viewMonth: monthKey(new Date()),
  };

  function monthKey(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }
  function fmt(n){ return '$'+(Math.round(n*100)/100).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}); }
  function fmtShort(n){ return '$'+Math.round(n).toLocaleString(); }
  function catBudgetTotal(){ return Object.values(state.catBudgets).reduce((s,v)=>s+(v||0),0); }

  // ---- Storage: auto-detects context ----
  // Inside Claude.ai preview → window.storage (shared, works in preview)
  // Published standalone link → Firebase (cross-device) + localStorage (cache)
  const IN_CLAUDE = typeof window.storage !== 'undefined';
  let trackerId = null;
  let saveTimeout = null;
  let unsubscribeTracker = null;

  function cloudData(){
    return { settings:state.settings, catBudgets:state.catBudgets, expenses:state.expenses, fund:state.fund };
  }

function getTrackerIdFromEnv(){
  try{
    const h = window.location.hash.replace('#','');
    if(h) return h;
    return localStorage.getItem('et_tracker_id') || null;
  }catch(e){ return null; }
}

function setHash(id){
  try{ history.replaceState(null,'','#'+id); }catch(e){}
  try{ localStorage.setItem('et_tracker_id', id); }catch(e){}
}

function getShareUrl(){
  return window.location.href.split('#')[0] + '#' + trackerId;
}

function makeTrackerId(){
  return Math.random().toString(36).slice(2, 10) + Date.now().toString(36).slice(-4);
}

async function createTracker(){
  trackerId = makeTrackerId();
  await setDoc(doc(db, "trackers", trackerId), cloudData());
  return trackerId;
}

async function fetchTracker(id){
  const snap = await getDoc(doc(db, "trackers", id));
  if(!snap.exists()) throw new Error("Tracker not found");
  return snap.data();
}

async function pushTracker(){
  if(!trackerId) return;
  try{
    await setDoc(doc(db, "trackers", trackerId), cloudData());
  }catch(e){
    console.error('Cloud save failed', e);
  }
}

function listenToTracker(id){
  if(unsubscribeTracker) unsubscribeTracker();

  unsubscribeTracker = onSnapshot(doc(db, "trackers", id), (snap) => {
    if(!snap.exists()) return;

    const data = snap.data();

    if(data.settings) state.settings = data.settings;
    if(data.catBudgets) state.catBudgets = data.catBudgets;
    if(data.expenses) state.expenses = data.expenses;
    if(data.fund) state.fund = data.fund;

    render();
  });
}

  function scheduleSave(){
    if(IN_CLAUDE){ saveClaudeStorage(); return; }
    clearTimeout(saveTimeout);
    saveTimeout = setTimeout(pushTracker, 500);
  }

  // ---- window.storage helpers (Claude context) ----
  async function saveClaudeStorage(){
    try{ await window.storage.set('settings', JSON.stringify(state.settings), true); }catch(e){}
    try{ await window.storage.set('catBudgets', JSON.stringify(state.catBudgets), true); }catch(e){}
    try{ await window.storage.set('expenses', JSON.stringify(state.expenses), true); }catch(e){}
    try{ await window.storage.set('fund', JSON.stringify(state.fund), true); }catch(e){}
  }

  async function saveSettings(){ scheduleSave(); }
  async function saveCatBudgets(){ scheduleSave(); }
  async function saveExpenses(){ scheduleSave(); }
  async function saveFund(){ scheduleSave(); }

  // ---- Boot ----
  async function loadAll(){
    const root = document.getElementById('jf-root');

    if(IN_CLAUDE){
      // Inside Claude.ai — use window.storage directly, no setup screen needed
      try{ const s=await window.storage.get('settings',true); if(s&&s.value) state.settings=JSON.parse(s.value); }catch(e){}
      try{ const b=await window.storage.get('catBudgets',true); if(b&&b.value) state.catBudgets=JSON.parse(b.value); }catch(e){}
      try{ const ex=await window.storage.get('expenses',true); if(ex&&ex.value) state.expenses=JSON.parse(ex.value); }catch(e){}
      try{ const fd=await window.storage.get('fund',true); if(fd&&fd.value) state.fund=JSON.parse(fd.value); }catch(e){}
      render();
      return;
    }

    // Published standalone — use Firestore
trackerId = getTrackerIdFromEnv();

if(trackerId){
  root.innerHTML = `<div class="jf-loading">Loading your data…</div>`;
  try{
    const data = await fetchTracker(trackerId);

    if(data.settings) state.settings = data.settings;
    if(data.catBudgets) state.catBudgets = data.catBudgets;
    if(data.expenses) state.expenses = data.expenses;
    if(data.fund) state.fund = data.fund;

    setHash(trackerId);
    listenToTracker(trackerId);
    render();
  }catch(e){
    trackerId = null;
    try{ localStorage.removeItem('et_tracker_id'); }catch(e2){}
    renderSetup('Could not load that tracker — the link may be invalid.');
  }
} else {
  renderSetup(null);
}
  }
  function renderSetup(errorMsg){
    const root = document.getElementById('jf-root');
    root.innerHTML = `
      <div style="max-width:440px;margin:60px auto;padding:0 20px;">
        <p style="text-transform:uppercase;letter-spacing:.14em;font-size:10.5px;color:var(--text-faint);font-weight:600;margin:0 0 6px;">Shared Expense Tracker</p>
        <h1 style="font-family:'Fraunces',serif;font-size:26px;margin:0 0 6px;">Get started</h1>
        <p style="font-size:13px;color:var(--text-soft);margin:0 0 28px;">Create a new tracker and share the link with your partner, or join one they've already set up.</p>
        ${errorMsg?`<p style="font-size:13px;color:var(--warn);margin:0 0 16px;">${errorMsg}</p>`:''}
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:14px;">
          <p style="font-weight:700;margin:0 0 6px;">Start fresh</p>
          <p style="font-size:12.5px;color:var(--text-soft);margin:0 0 14px;">Creates a new tracker and gives you a shareable link to send your partner.</p>
          <button id="jf-create" class="jf-btn jf-btn-primary" style="width:100%;">Create new tracker</button>
          <p id="jf-create-err" style="font-size:12px;color:var(--warn);margin:8px 0 0;display:none;"></p>
        </div>
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;">
          <p style="font-weight:700;margin:0 0 6px;">Join an existing tracker</p>
          <p style="font-size:12.5px;color:var(--text-soft);margin:0 0 10px;">Paste the shared link your partner sent you.</p>
          <div style="display:flex;gap:8px;">
            <input id="jf-join-id" type="text" placeholder="Paste link or ID here" style="flex:1;padding:9px 10px;border:1px solid var(--border);border-radius:9px;font-family:'Inter',sans-serif;font-size:13px;background:var(--surface-2);color:var(--text);">
            <button id="jf-join" class="jf-btn jf-btn-primary">Join</button>
          </div>
          <p id="jf-join-err" style="font-size:12px;color:var(--warn);margin:8px 0 0;display:none;"></p>
        </div>
      </div>
    `;

    document.getElementById('jf-create').onclick = async () => {
      const btn = document.getElementById('jf-create');
      const err = document.getElementById('jf-create-err');
      btn.textContent = 'Creating…'; btn.disabled = true; err.style.display='none';
      try{
       trackerId = await createTracker();
       listenToTracker(trackerId);
        setHash(trackerId);
        render();
      }catch(e){
        btn.textContent = 'Create new tracker'; btn.disabled = false;
        err.textContent = 'Could not connect — check your internet and try again. ('+e.message+')';
        err.style.display = 'block';
      }
    };

    document.getElementById('jf-join').onclick = async () => {
      const val = document.getElementById('jf-join-id').value.trim();
      const match = val.match(/#?([a-z0-9]{8,})$/i);
      const err = document.getElementById('jf-join-err');
      if(!match){ err.textContent = 'Paste the full shared link or just the number ID.'; err.style.display='block'; return; }
      const id = match[1];
      const btn = document.getElementById('jf-join');
      btn.textContent = 'Joining…'; btn.disabled = true; err.style.display='none';
      try{
        const data = await fetchTracker(id);
        trackerId = id;
        if(data.settings) state.settings = data.settings;
        if(data.catBudgets) state.catBudgets = data.catBudgets;
        if(data.expenses) state.expenses = data.expenses;
        if(data.fund) state.fund = data.fund;
        setHash(trackerId);
        listenToTracker(trackerId);
        render();
      }catch(e){
        btn.textContent = 'Join'; btn.disabled = false;
        err.textContent = 'Couldn\'t find that tracker — double-check the link. ('+e.message+')';
        err.style.display='block';
      }
    };
  }

  function expensesForMonth(mk){ return state.expenses.filter(e=>e.date.slice(0,7)===mk); }
  function availableMonths(){
    const set=new Set(state.expenses.map(e=>e.date.slice(0,7)));
    set.add(state.viewMonth); set.add(monthKey(new Date()));
    return Array.from(set).sort();
  }
  function fundTotal(){ return state.fund.reduce((s,f)=>s+f.amount,0); }
  function daysUntilTrip(){
    const today=new Date(); today.setHours(0,0,0,0);
    const trip=new Date(state.settings.tripDate+'T00:00:00');
    return Math.max(0,Math.ceil((trip-today)/86400000));
  }
  function monthLabel(mk){ const [y,m]=mk.split('-').map(Number); return new Date(y,m-1,1).toLocaleDateString(undefined,{month:'long',year:'numeric'}); }
  function shiftMonth(mk,delta){ const [y,m]=mk.split('-').map(Number); return monthKey(new Date(y,m-1+delta,1)); }

  function nudgeMessage(totalSpend){
    const budget=catBudgetTotal();
    const pct=budget>0?totalSpend/budget:0;
    if(pct<0.5) return `Nice pace — you've used <b>${Math.round(pct*100)}%</b> of this month's combined budget. Keep it up and there's more to put toward the Busselton fund.`;
    if(pct<0.85) return `You're at <b>${Math.round(pct*100)}%</b> of the combined budget. Still on track, but watch the food &amp; snacks runs — that's usually where it slips.`;
    if(pct<1) return `Heads up — <b>${Math.round(pct*100)}%</b> of the budget is gone. A few quiet nights in this week helps.`;
    return `Budget's been passed this month (<b>${fmtShort(totalSpend-budget)}</b> over). Worth a quick check-in with each other before the next snack run.`;
  }

  function donutGradient(byCat,catIds,total){
    let acc=0; const stops=[];
    catIds.forEach(c=>{ const pct=byCat[c]/total*100; stops.push(`${catById(c).color} ${acc}% ${acc+pct}%`); acc+=pct; });
    return `conic-gradient(${stops.join(',')})`;
  }

  function tabBtn(id,label){ return `<button class="jf-tab ${state.tab===id?'active':''}" data-tab="${id}">${label}</button>`; }

  function statusCard(name, spend, budget){
    const over=spend>budget;
    const pct=budget>0?Math.min(1,spend/budget):(spend>0?1:0);
    const remaining=budget-spend;
    return `<div class="jf-status-card">
      <div class="jf-status-top">
        <span class="jf-status-name">${name}</span>
        <span class="jf-status-state ${over?'over':'under'}">${over?'over budget':'under budget'}</span>
      </div>
      <div class="jf-status-amt">${fmtShort(spend)} <span>of ${fmtShort(budget)} this month</span></div>
      <div class="jf-status-track"><div class="jf-status-fill" style="width:${pct*100}%;background:${over?'var(--warn)':'var(--accent)'}"></div></div>
      <div class="jf-status-sub">${over?fmtShort(Math.abs(remaining))+' over':fmtShort(remaining)+' remaining'}</div>
    </div>`;
  }

  function render(){
    const root=document.getElementById('jf-root');
    const names=state.settings.names;
    const days=daysUntilTrip();
    const mk=monthKey(new Date());
    const monthExpNow=expensesForMonth(mk);
    const spendA=monthExpNow.filter(e=>e.person===0).reduce((s,e)=>s+e.amount,0);
    const spendB=monthExpNow.filter(e=>e.person===1).reduce((s,e)=>s+e.amount,0);
    const budget=catBudgetTotal();

    const ml=state.settings.milestoneLabel||'Milestone';
    root.innerHTML=`
      <div class="jf-shell">
        <div class="jf-topbar">
          <div class="jf-brand">
            <p class="jf-eyebrow">Perth &rarr; ${ml}</p>
            <h1 class="jf-display">Expense Tracker</h1>
          </div>
          <div style="display:flex;align-items:center;gap:10px;">
            <button id="jf-refresh" title="Sync latest data" style="background:var(--surface-2);border:1px solid var(--border);color:var(--text-soft);border-radius:8px;padding:6px 10px;cursor:pointer;font-size:13px;">↻ Sync</button>
            <div class="jf-countdown"><div class="num">${days}</div><div class="lbl">days to ${ml}</div></div>
          </div>
        </div>

        <div class="jf-status-grid">
          ${statusCard(names[0],spendA,budget)}
          ${statusCard(names[1],spendB,budget)}
        </div>

        <div class="jf-tabs">
          ${tabBtn('overview','Overview')}
          ${tabBtn('spending','Spending')}
          ${tabBtn('budgets','Budgets')}
          ${tabBtn('fund','Busselton Fund')}
          ${tabBtn('settings','Settings')}
        </div>

        <div id="jf-tabcontent"></div>

        <p class="jf-footer-note">All data is shared between both of you — anyone with this link sees and edits the same numbers.</p>
      </div>
    `;

    root.querySelectorAll('.jf-tab').forEach(btn=>{
      btn.onclick=()=>{ state.tab=btn.dataset.tab; render(); };
    });

    const content=document.getElementById('jf-tabcontent');
    if(state.tab==='overview') content.innerHTML=renderOverview(names);
    else if(state.tab==='spending') content.innerHTML=renderSpending(names);
    else if(state.tab==='budgets') content.innerHTML=renderBudgets();
    else if(state.tab==='fund') content.innerHTML=renderFund(names);
    else content.innerHTML=renderSettings(names);

    wireTabEvents();
  }

  function renderOverview(names){
    const mk=monthKey(new Date());
    const monthExp=expensesForMonth(mk);
    const totalThis=monthExp.reduce((s,e)=>s+e.amount,0);
    const spendA=monthExp.filter(e=>e.person===0).reduce((s,e)=>s+e.amount,0);
    const spendB=monthExp.filter(e=>e.person===1).reduce((s,e)=>s+e.amount,0);
    const maxAB=Math.max(spendA,spendB,1);
    const leaderLower=spendA===spendB?-1:(spendA<spendB?0:1);

    return `<div class="jf-grid">
      <div class="jf-card">
        <h2>Who's spending more <span class="tag">${monthLabel(mk)}</span></h2>
        <div class="jf-vs">
          ${[0,1].map(i=>{
            const amt=i===0?spendA:spendB;
            const isLower=leaderLower===i;
            const col=i===0?'#5B9BD5':'#E8A75D';
            return `<div class="jf-vs-person ${isLower?'lead':''}">
              <div class="jf-vs-name">${names[i]} ${isLower?'<span class="jf-badge">saving more</span>':''}</div>
              <div class="jf-vs-amt">${fmtShort(amt)}</div>
              <div class="jf-vs-bar-track"><div class="jf-vs-bar-fill" style="width:${(amt/maxAB)*100}%;background:${col}"></div></div>
            </div>`;
          }).join('')}
        </div>
        <p style="font-size:12px;color:var(--text-faint);margin:12px 0 0;">Combined: <b class="jf-mono" style="color:var(--text)">${fmt(totalThis)}</b> of <b class="jf-mono" style="color:var(--text)">${fmtShort(catBudgetTotal())}</b> budget</p>
      </div>
      <div class="jf-card">
        <h2>Accountability check-in</h2>
        <div class="jf-nudge">${nudgeMessage(totalThis)}</div>
        <div class="jf-streak-row">
          <span class="jf-streak-pill">Lower spender: <b>${spendA===spendB?'Tied':names[leaderLower]}</b></span>
          <span class="jf-streak-pill">Busselton fund: <b>${fmtShort(fundTotal())}</b></span>
        </div>
      </div>
      <div class="jf-card" style="grid-column:1/-1;">
        <h2>Recent activity</h2>
        ${monthExp.length===0?'<p class="jf-empty">No expenses logged yet this month. Add one from the Spending tab.</p>':
          monthExp.slice().sort((a,b)=>b.date.localeCompare(a.date)).slice(0,6).map(e=>`
            <div class="jf-tx">
              <div class="jf-tx-left">
                <span class="jf-dot" style="background:${catById(e.cat).color}"></span>
                <div>
                  <div>${e.note?e.note:catById(e.cat).name}</div>
                  <div class="jf-tx-meta">${names[e.person]} · ${catById(e.cat).name} · ${new Date(e.date+'T00:00:00').toLocaleDateString(undefined,{day:'numeric',month:'short'})}</div>
                </div>
              </div>
              <span class="jf-tx-amt">${fmt(e.amount)}</span>
            </div>
          `).join('')}
      </div>
    </div>`;
  }

  function renderSpending(names){
    const months=availableMonths();
    const monthExp=expensesForMonth(state.viewMonth);
    const dataA=CATS.map(c=>monthExp.filter(e=>e.cat===c.id&&e.person===0).reduce((s,e)=>s+e.amount,0));
    const dataB=CATS.map(c=>monthExp.filter(e=>e.cat===c.id&&e.person===1).reduce((s,e)=>s+e.amount,0));
    const usedIdx=CATS.map((c,i)=>(dataA[i]+dataB[i])>0?i:-1).filter(i=>i>=0);
    const maxCmp=Math.max(...usedIdx.map(i=>Math.max(dataA[i],dataB[i])),1);

    function personDonut(personData, personName){
      const total=personData.reduce((s,v)=>s+v,0);
      if(total===0) return `<p class="jf-empty">No expenses logged for ${personName} yet.</p>`;
      const byCat={};
      CATS.forEach((c,i)=>{ if(personData[i]>0) byCat[c.id]=personData[i]; });
      const catIds=Object.keys(byCat).sort((a,b)=>byCat[b]-byCat[a]);
      const bg=donutGradient(byCat,catIds,total);
      return `<div class="jf-donut-wrap">
        <div class="jf-donut" style="background:${bg}"><div class="jf-donut-hole"><b>${fmtShort(total)}</b><span>total</span></div></div>
        <div class="jf-legend">${catIds.map(c=>`<div class="jf-legend-row"><span class="lab"><span class="jf-dot" style="background:${catById(c).color}"></span>${catById(c).name}</span><b>${fmtShort(byCat[c])}</b></div>`).join('')}</div>
      </div>`;
    }

    return `
      <div class="jf-monthnav">
        <button id="jf-prevmonth">&larr;</button>
        <select id="jf-month">${months.map(m=>`<option value="${m}" ${m===state.viewMonth?'selected':''}>${monthLabel(m)}</option>`).join('')}</select>
        <button id="jf-nextmonth">&rarr;</button>
      </div>
      <div class="jf-grid">
        <div class="jf-card">
          <h2>${names[0]}'s spending</h2>
          ${personDonut(dataA, names[0])}
        </div>
        <div class="jf-card">
          <h2>${names[1]}'s spending</h2>
          ${personDonut(dataB, names[1])}
        </div>
        <div class="jf-card" style="grid-column:1/-1;">
          <h2>${names[0]} vs ${names[1]} by category</h2>
          ${usedIdx.length===0?'<p class="jf-empty">Nothing logged yet this month.</p>':
            usedIdx.map(i=>`
              <div class="jf-cmp-row">
                <div class="jf-cmp-cat"><span class="jf-dot" style="background:${CATS[i].color}"></span>${CATS[i].name}</div>
                <div class="jf-cmp-bars">
                  <div class="jf-cmp-bar-track"><div class="jf-cmp-bar-fill" style="width:${(dataA[i]/maxCmp)*100}%;background:#5B9BD5"></div></div>
                  <div class="jf-cmp-bar-track"><div class="jf-cmp-bar-fill" style="width:${(dataB[i]/maxCmp)*100}%;background:#E8A75D"></div></div>
                </div>
                <div class="jf-cmp-vals"><span>${names[0]}: ${fmtShort(dataA[i])}</span><span>${names[1]}: ${fmtShort(dataB[i])}</span></div>
              </div>
            `).join('')}
        </div>
        <div class="jf-card" style="grid-column:1/-1;">
          <h2>Add an expense</h2>
          <div class="jf-form">
            <div class="jf-field full"><label>Who spent it</label>
              <div class="jf-toggle">
                <button type="button" id="jf-p0" class="${state.person===0?'active':''}">${names[0]}</button>
                <button type="button" id="jf-p1" class="${state.person===1?'active':''}">${names[1]}</button>
              </div>
            </div>
            <div class="jf-field"><label>Amount (AUD)</label><input type="number" id="jf-amt" min="0" step="0.01" placeholder="0.00"></div>
            <div class="jf-field"><label>Category</label><select id="jf-cat">${CATS.map(c=>`<option value="${c.id}">${c.name}</option>`).join('')}</select></div>
            <div class="jf-field"><label>Date</label><input type="date" id="jf-date" value="${new Date().toISOString().slice(0,10)}"></div>
            <div class="jf-field"><label>Note (optional)</label><input type="text" id="jf-note" placeholder="e.g. servo snacks"></div>
            <div class="full" style="margin-top:4px;"><button class="jf-btn jf-btn-primary" id="jf-add">Add expense</button></div>
          </div>
        </div>
        <div class="jf-card" style="grid-column:1/-1;">
          <h2>Transactions <span class="tag">${monthLabel(state.viewMonth)}</span></h2>
          ${monthExp.length===0?'<p class="jf-empty">No expenses logged this month yet.</p>':
            monthExp.slice().sort((a,b)=>b.date.localeCompare(a.date)).map(e=>`
              <div class="jf-tx">
                <div class="jf-tx-left">
                  <span class="jf-dot" style="background:${catById(e.cat).color}"></span>
                  <div>
                    <div>${e.note?e.note:catById(e.cat).name}</div>
                    <div class="jf-tx-meta">${names[e.person]} · ${catById(e.cat).name} · ${new Date(e.date+'T00:00:00').toLocaleDateString(undefined,{day:'numeric',month:'short'})}</div>
                  </div>
                </div>
                <div style="display:flex;align-items:center;gap:6px;">
                  <span class="jf-tx-amt">${fmt(e.amount)}</span>
                  <button class="jf-tx-del" data-id="${e.id}">&times;</button>
                </div>
              </div>
            `).join('')}
        </div>
      </div>
    `;
  }

  function renderBudgets(){
    const monthExp=expensesForMonth(state.viewMonth);
    const names=state.settings.names;
    const total=catBudgetTotal();

    function personBudgetRows(personIdx){
      const rows=CATS.map(c=>{
        const b=state.catBudgets[c.id]||0;
        const spent=monthExp.filter(e=>e.cat===c.id&&e.person===personIdx).reduce((s,e)=>s+e.amount,0);
        if(b===0&&spent===0) return '';
        const pctc=b>0?Math.min(1,spent/b):(spent>0?1:0);
        const over=b>0&&spent>b;
        return `<div class="jf-budget-row">
          <div class="jf-budget-top">
            <span class="cat"><span class="jf-dot" style="background:${c.color}"></span>${c.name}</span>
            <span class="jf-mono">${fmtShort(spent)} / ${b>0?fmtShort(b):'—'}</span>
          </div>
          <div class="jf-budget-track"><div class="jf-budget-fill" style="width:${pctc*100}%;background:${over?'var(--warn)':c.color}"></div></div>
          ${over?`<div class="jf-budget-over">${fmtShort(spent-b)} over</div>`:''}
        </div>`;
      }).join('');
      return rows||'<p class="jf-empty">No expenses logged yet.</p>';
    }

    return `<div class="jf-grid">
      <div class="jf-card">
        <h2>${names[0]}'s budgets <span class="tag">${monthLabel(state.viewMonth)}</span></h2>
        ${personBudgetRows(0)}
      </div>
      <div class="jf-card">
        <h2>${names[1]}'s budgets <span class="tag">${monthLabel(state.viewMonth)}</span></h2>
        ${personBudgetRows(1)}
      </div>
      <div class="jf-card" style="grid-column:1/-1;">
        <h2>Edit category budgets</h2>
        <p style="font-size:12.5px;color:var(--text-soft);margin:0 0 12px;">These limits apply to each of you individually.</p>
        <div class="jf-cat-budget-grid">
          ${CATS.map(c=>`
            <label><span class="jf-dot" style="background:${c.color}"></span>${c.name}</label>
            <input type="number" min="0" step="5" class="jf-cb" data-cat="${c.id}" value="${state.catBudgets[c.id]||0}">
          `).join('')}
        </div>
        <div class="jf-budget-total-row">
          <span>Monthly total per person</span>
          <span id="jf-cb-total">${fmtShort(total)}</span>
        </div>
        <button class="jf-btn jf-btn-primary" id="jf-save-catbudgets" style="margin-top:14px;">Save budgets</button>
      </div>
    </div>`;
  }

  function renderFund(names){
    const total=fundTotal();
    const sorted=state.fund.slice().sort((a,b)=>b.date.localeCompare(a.date));
    const byPerson=[0,1].map(i=>state.fund.filter(f=>f.person===i).reduce((s,f)=>s+f.amount,0));
    return `<div class="jf-grid">
      <div class="jf-card" style="grid-column:1/-1;">
        <h2>Busselton Fund</h2>
        <div class="jf-fund-balance"><b>${fmtShort(total)}</b><span>total saved toward the trip</span></div>
        <div class="jf-streak-row">
          <span class="jf-streak-pill">${names[0]} contributed: <b>${fmtShort(byPerson[0])}</b></span>
          <span class="jf-streak-pill">${names[1]} contributed: <b>${fmtShort(byPerson[1])}</b></span>
        </div>
      </div>
      <div class="jf-card">
        <h2>Add to the fund</h2>
        <div class="jf-form">
          <div class="jf-field full"><label>Who's contributing</label>
            <div class="jf-toggle">
              <button type="button" id="jf-fp0" class="${state.fundPerson===0?'active':''}">${names[0]}</button>
              <button type="button" id="jf-fp1" class="${state.fundPerson===1?'active':''}">${names[1]}</button>
            </div>
          </div>
          <div class="jf-field"><label>Amount (AUD)</label><input type="number" id="jf-fund-amt" min="0" step="0.01" placeholder="0.00"></div>
          <div class="jf-field"><label>Date</label><input type="date" id="jf-fund-date" value="${new Date().toISOString().slice(0,10)}"></div>
          <div class="jf-field full"><label>Note (optional)</label><input type="text" id="jf-fund-note" placeholder="e.g. leftover from payday"></div>
          <div class="full" style="margin-top:4px;"><button class="jf-btn jf-btn-primary" id="jf-fund-add">Add contribution</button></div>
        </div>
      </div>
      <div class="jf-card">
        <h2>Contribution history</h2>
        ${sorted.length===0?'<p class="jf-empty">No contributions yet — add the first one.</p>':
          sorted.map(f=>`
            <div class="jf-tx">
              <div class="jf-tx-left">
                <div>
                  <div>${f.note?f.note:'Fund contribution'}</div>
                  <div class="jf-tx-meta">${names[f.person]} · ${new Date(f.date+'T00:00:00').toLocaleDateString(undefined,{day:'numeric',month:'short'})}</div>
                </div>
              </div>
              <div style="display:flex;align-items:center;gap:6px;">
                <span class="jf-tx-amt pos">+${fmt(f.amount)}</span>
                <button class="jf-tx-del-fund" data-id="${f.id}">&times;</button>
              </div>
            </div>
          `).join('')}
      </div>
    </div>`;
  }

  function renderSettings(names){
    const ml=state.settings.milestoneLabel||'Milestone';
    const shareUrl = getShareUrl();
    return `<div class="jf-settings-grid">
      <div class="jf-card">
        <h2>Names &amp; milestone</h2>
        <div class="jf-field" style="margin-bottom:10px;"><label>Name 1</label><input type="text" id="jf-name0" value="${names[0]}"></div>
        <div class="jf-field" style="margin-bottom:10px;"><label>Name 2</label><input type="text" id="jf-name1" value="${names[1]}"></div>
        <div class="jf-field" style="margin-bottom:10px;"><label>Milestone name</label><input type="text" id="jf-milestone-label" value="${ml}" placeholder="e.g. Busselton, Bali, Schoolies"></div>
        <div class="jf-field" style="margin-bottom:14px;"><label>Milestone date</label><input type="date" id="jf-tripdate" value="${state.settings.tripDate}"></div>
        <button class="jf-btn jf-btn-primary" id="jf-save-names" style="width:100%;">Save</button>
      </div>
      <div class="jf-card">
        <h2>Share with your partner</h2>
        <p style="font-size:12.5px;color:var(--text-soft);margin:0 0 10px;">Send this link to your partner. Anyone who opens it sees and edits the same data as you.</p>
        <div style="background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-family:'JetBrains Mono',monospace;font-size:11px;word-break:break-all;color:var(--text-soft);margin-bottom:10px;">${shareUrl}</div>
        <button class="jf-btn jf-btn-primary" id="jf-copy-link" style="width:100%;">Copy link</button>
        <div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--border);">
          <p style="font-weight:700;font-size:13px;margin:0 0 6px;">How budgets work</p>
          <p style="font-size:12.5px;color:var(--text-soft);margin:0;line-height:1.6;">Your monthly budget is the sum of your category budgets. Each limit applies to each of you individually — head to the <b style="color:var(--text);">Budgets</b> tab to adjust.</p>
        </div>
      </div>
    </div>`;
  }

  function wireTabEvents(){
    const root=document.getElementById('jf-root');

    const refreshBtn=document.getElementById('jf-refresh');
    if(refreshBtn) refreshBtn.onclick=async()=>{
      refreshBtn.textContent='↻ Syncing…'; refreshBtn.disabled=true;
      try{
        const data=await fetchTracker(trackerId);
        if(data.settings) state.settings=data.settings;
        if(data.catBudgets) state.catBudgets=data.catBudgets;
        if(data.expenses) state.expenses=data.expenses;
        if(data.fund) state.fund=data.fund;
        render();
      }catch(e){ refreshBtn.textContent='↻ Sync'; refreshBtn.disabled=false; }
    };

    const copyBtn=document.getElementById('jf-copy-link');
    if(copyBtn) copyBtn.onclick=()=>{
      navigator.clipboard.writeText(getShareUrl()).then(()=>{
        copyBtn.textContent='Copied!';
        setTimeout(()=>{ copyBtn.textContent='Copy link'; },2000);
      });
    };

    const monthSel=document.getElementById('jf-month');
    if(monthSel) monthSel.onchange=e=>{ state.viewMonth=e.target.value; render(); };
    const prevBtn=document.getElementById('jf-prevmonth');
    if(prevBtn) prevBtn.onclick=()=>{ state.viewMonth=shiftMonth(state.viewMonth,-1); render(); };
    const nextBtn=document.getElementById('jf-nextmonth');
    if(nextBtn) nextBtn.onclick=()=>{ state.viewMonth=shiftMonth(state.viewMonth,1); render(); };

    const p0=document.getElementById('jf-p0'); if(p0) p0.onclick=()=>{ state.person=0; render(); };
    const p1=document.getElementById('jf-p1'); if(p1) p1.onclick=()=>{ state.person=1; render(); };
    const fp0=document.getElementById('jf-fp0'); if(fp0) fp0.onclick=()=>{ state.fundPerson=0; render(); };
    const fp1=document.getElementById('jf-fp1'); if(fp1) fp1.onclick=()=>{ state.fundPerson=1; render(); };

    const addBtn=document.getElementById('jf-add');
    if(addBtn) addBtn.onclick=async()=>{
      const amt=parseFloat(document.getElementById('jf-amt').value);
      if(!amt||amt<=0){ document.getElementById('jf-amt').focus(); return; }
      const cat=document.getElementById('jf-cat').value;
      const date=document.getElementById('jf-date').value||new Date().toISOString().slice(0,10);
      const note=document.getElementById('jf-note').value.trim();
      state.expenses.push({id:Date.now()+'-'+Math.random().toString(36).slice(2,7),amount:amt,cat,date,note,person:state.person});
      state.viewMonth=date.slice(0,7);
      await saveExpenses(); render();
    };

    root.querySelectorAll('.jf-tx-del').forEach(btn=>{
      btn.onclick=async()=>{ state.expenses=state.expenses.filter(e=>e.id!==btn.dataset.id); await saveExpenses(); render(); };
    });

    const fundAddBtn=document.getElementById('jf-fund-add');
    if(fundAddBtn) fundAddBtn.onclick=async()=>{
      const amt=parseFloat(document.getElementById('jf-fund-amt').value);
      if(!amt||amt<=0){ document.getElementById('jf-fund-amt').focus(); return; }
      const date=document.getElementById('jf-fund-date').value||new Date().toISOString().slice(0,10);
      const note=document.getElementById('jf-fund-note').value.trim();
      state.fund.push({id:Date.now()+'-'+Math.random().toString(36).slice(2,7),amount:amt,date,note,person:state.fundPerson});
      await saveFund(); render();
    };

    root.querySelectorAll('.jf-tx-del-fund').forEach(btn=>{
      btn.onclick=async()=>{ state.fund=state.fund.filter(f=>f.id!==btn.dataset.id); await saveFund(); render(); };
    });

    const saveNames=document.getElementById('jf-save-names');
    if(saveNames) saveNames.onclick=async()=>{
      state.settings={
        ...state.settings,
        names:[document.getElementById('jf-name0').value.trim()||'You',document.getElementById('jf-name1').value.trim()||'Partner'],
        tripDate:document.getElementById('jf-tripdate').value||state.settings.tripDate,
        milestoneLabel:document.getElementById('jf-milestone-label').value.trim()||'Milestone',
      };
      await saveSettings(); render();
    };

    // live-update total as category budget inputs change
    root.querySelectorAll('.jf-cb').forEach(inp=>{
      inp.oninput=()=>{
        const total=Array.from(root.querySelectorAll('.jf-cb')).reduce((s,i)=>s+(parseFloat(i.value)||0),0);
        const el=document.getElementById('jf-cb-total');
        if(el) el.textContent=fmtShort(total);
      };
    });

    const saveCB=document.getElementById('jf-save-catbudgets');
    if(saveCB) saveCB.onclick=async()=>{
      const next={...state.catBudgets};
      root.querySelectorAll('.jf-cb').forEach(inp=>{ next[inp.dataset.cat]=parseFloat(inp.value)||0; });
      state.catBudgets=next;
      await saveCatBudgets(); render();
    };
  }

  loadAll();
})();
</script>
